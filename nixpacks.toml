[phases.setup]
nixPkgs = ['php82', 'php82Extensions.intl', 'php82Extensions.pdo_sqlite', 'php82Extensions.pdo_mysql', 'php82Extensions.pdo_pgsql', 'php82Extensions.bcmath', 'php82Extensions.zip', 'php82Extensions.curl', 'nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci && npm run build',
    'mkdir -p storage/framework/{sessions,views,cache}',
    'mkdir -p storage/logs'
]

[start]
cmd = 'php artisan storage:link 2>/dev/null; php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT'
